<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GMAT Question Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080c14;--card:#111827;--card2:#141e30;
  --border:#1c2a40;--accent:#3b82f6;--accent2:#6366f1;
  --text:#e2e8f0;--text2:#94a3b8;--muted:#4b6280;
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --d1:#10b981;--d1b:rgba(16,185,129,.1);
  --d2:#84cc16;--d2b:rgba(132,204,22,.1);
  --d3:#f59e0b;--d3b:rgba(245,158,11,.1);
  --d4:#f97316;--d4b:rgba(249,115,22,.1);
  --d5:#ef4444;--d5b:rgba(239,68,68,.1);
  --d6:#ec4899;--d6b:rgba(236,72,153,.1);
  --d7:#a855f7;--d7b:rgba(168,85,247,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 15% 5%,rgba(59,130,246,.06) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 85%,rgba(99,102,241,.05) 0%,transparent 60%);}
.wrapper{position:relative;z-index:1;max-width:100%;margin:0 auto;padding:24px 18px 80px;}

/* Header */
header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:14px;flex-wrap:wrap;}
.logo h1{font-family:'Space Mono',monospace;font-size:clamp(14px,2.2vw,22px);font-weight:700;
  background:linear-gradient(135deg,#60a5fa,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo p{color:var(--muted);font-size:11px;margin-top:4px;}
.kpi-row{display:flex;gap:8px;flex-wrap:wrap;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 14px;text-align:center;min-width:78px;}
.kpi .v{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;line-height:1;}
.kpi .l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px;}

/* Overall bar */
.ob{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px 18px;margin-bottom:14px;}
.ob-lbl{font-size:11px;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;}
.ob-bar{flex:1;height:7px;border-radius:4px;background:var(--border);overflow:hidden;min-width:80px;}
.ob-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#10b981,#3b82f6,#6366f1);transition:width .5s;}
.ob-pct{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);}

/* Save bar */
.savebar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--card);
  border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin-bottom:14px;}
.savebar-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;}
.savebar-btns{display:flex;gap:7px;flex-wrap:wrap;}
.btn{padding:6px 14px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;border:1px solid;}
.btn-exp{border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.1);color:#60a5fa;}
.btn-exp:hover{background:rgba(59,130,246,.22);}
.btn-imp{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);color:#34d399;}
.btn-imp:hover{background:rgba(16,185,129,.22);}
.btn-clr{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.07);color:#f87171;}
.btn-clr:hover{background:rgba(239,68,68,.18);}
.save-status{font-size:11px;font-family:'Space Mono',monospace;margin-left:auto;opacity:0;transition:opacity .4s;}
.save-status.show{opacity:1;}

/* Legend */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.leg-dot{width:7px;height:7px;border-radius:50%;}

/* Tabs */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;}
.tab{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab:hover{border-color:var(--accent);color:var(--text);}
.tab.active{background:linear-gradient(135deg,#1d4ed8,#4338ca);border-color:transparent;color:#fff;
  box-shadow:0 4px 14px rgba(59,130,246,.28);}
.tab.sw-tab.active{background:linear-gradient(135deg,#065f46,#064e3b);box-shadow:0 4px 14px rgba(16,185,129,.25);}

.panel{display:none;}
.panel.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.sec-title{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── Table ── */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.35);overflow-x:auto;}
table{width:100%;border-collapse:collapse;}

/* Two-row header */
thead tr.hr1 th{
  padding:10px 4px 4px;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;text-align:center;white-space:nowrap;border-bottom:none;
}
thead tr.hr2 th{
  padding:3px 4px 9px;font-size:9px;font-weight:600;text-transform:uppercase;
  letter-spacing:.4px;text-align:center;border-bottom:1px solid var(--border);
  color:rgba(255,255,255,.35);white-space:nowrap;
}
th.tc{text-align:left !important;padding-left:16px !important;color:var(--muted);min-width:190px;vertical-align:middle;}
th.tc-spacer{border-bottom:1px solid var(--border);}

/* Diff column colour groups */
.g1{color:var(--d1);background:var(--d1b);}
.g2{color:var(--d2);background:var(--d2b);}
.g3{color:var(--d3);background:var(--d3b);}
.g4{color:var(--d4);background:var(--d4b);}
.g5{color:var(--d5);background:var(--d5b);}
.g6{color:var(--d6);background:var(--d6b);}
.g7{color:var(--d7);background:var(--d7b);}
.g-tot{color:var(--accent);background:rgba(59,130,246,.08);}
.g-acc{color:var(--warn);background:rgba(245,158,11,.08);}
.g-prg{color:var(--muted);background:transparent;}

/* Body */
tbody tr{transition:background .12s;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody tr:not(:last-child) td{border-bottom:1px solid rgba(255,255,255,.035);}
td{padding:0;text-align:center;vertical-align:middle;}
td.tn{text-align:left;padding:0 8px 0 16px;font-size:13px;color:var(--text);font-weight:500;height:64px;}

/* ── Per-difficulty cell: stacked Att / Cor / Acc% ── */
.dc-cell{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;padding:5px 3px;min-width:68px;height:64px;
}
.dc-row{display:flex;align-items:center;gap:3px;width:100%;}
.dc-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  width:14px;flex-shrink:0;text-align:right;}
.dc-lbl.att{color:var(--text2);}
.dc-lbl.cor{color:var(--success);}
.dc-inp{
  flex:1;height:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:4px;outline:none;color:var(--text);font-family:'Space Mono',monospace;
  font-size:11px;text-align:center;cursor:pointer;-moz-appearance:textfield;
  transition:border-color .15s,background .15s;
}
.dc-inp::-webkit-inner-spin-button,.dc-inp::-webkit-outer-spin-button{-webkit-appearance:none;}
.dc-inp:focus{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08);}
.dc-inp.att-inp.hv{color:#60a5fa;font-weight:700;border-color:rgba(59,130,246,.3);}
.dc-inp.cor-inp{color:var(--success);}
.dc-inp.cor-inp.hv{font-weight:700;border-color:rgba(16,185,129,.3);}
.dc-acc{font-size:9px;font-family:'Space Mono',monospace;font-weight:700;margin-top:1px;
  min-height:11px;letter-spacing:.2px;}

/* Summary cells */
td.tot-cell{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
  color:var(--accent);padding:0 6px;white-space:nowrap;}
td.acc-cell{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;padding:0 6px;}
td.prg-cell{padding:0 10px;min-width:82px;}
.pb{height:5px;border-radius:3px;background:var(--border);overflow:hidden;}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#6366f1);transition:width .4s;}
.pp{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);margin-top:3px;text-align:right;}

tfoot td{padding:10px 6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
  color:var(--accent2);background:rgba(99,102,241,.07);border-top:1px solid var(--border);text-align:center;}
tfoot td.tn{text-align:left;padding-left:16px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.ft-mini{display:flex;flex-direction:column;gap:1px;align-items:center;line-height:1.4;}
.ft-att{color:var(--accent2);}
.ft-cor{color:var(--success);font-size:9px;}
.ft-acc{font-size:9px;}

/* ── SW Tab ── */
.sw-note{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:10px;
  padding:13px 16px;margin-bottom:18px;font-size:12px;color:var(--text2);line-height:1.7;}
.sw-note strong{color:var(--accent);}
.sw-summary{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px;}
.sw-summary h3{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px;font-family:'Space Mono',monospace;}
.sw-bars{display:flex;flex-direction:column;gap:12px;}
.sw-br{display:flex;align-items:center;gap:12px;}
.sw-bl{font-size:12px;color:var(--text2);width:170px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sw-bt{flex:1;height:7px;border-radius:4px;background:var(--border);overflow:hidden;}
.sw-bf{height:100%;border-radius:4px;transition:width .5s;}
.sw-bp{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0;}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:660px){.sw-grid{grid-template-columns:1fr;}}
.sw-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.sw-hd{padding:12px 16px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.sw-hd.str{background:rgba(16,185,129,.12);color:var(--success);border-bottom:1px solid rgba(16,185,129,.15);}
.sw-hd.wk{background:rgba(239,68,68,.12);color:var(--danger);border-bottom:1px solid rgba(239,68,68,.15);}
.sw-hd.med{background:rgba(245,158,11,.1);color:var(--warn);border-bottom:1px solid rgba(245,158,11,.15);}
.sw-hd.none{background:rgba(75,98,128,.12);color:var(--muted);border-bottom:1px solid var(--border);}
.hd-dot{width:7px;height:7px;border-radius:50%;}
.sw-list{padding:6px 0;}
.sw-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;transition:background .12s;gap:10px;}
.sw-item:hover{background:rgba(255,255,255,.022);}
.si-l{display:flex;flex-direction:column;gap:2px;}
.si-name{font-size:12px;font-weight:500;color:var(--text);}
.si-sec{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.si-r{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.si-cnt{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
.si-badge{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;}
.si-badge.str{background:rgba(16,185,129,.15);color:var(--success);}
.si-badge.wk{background:rgba(239,68,68,.15);color:var(--danger);}
.si-badge.med{background:rgba(245,158,11,.15);color:var(--warn);}
.sw-empty{padding:24px 16px;text-align:center;color:var(--muted);font-size:12px;font-style:italic;line-height:1.8;}
.sw-tags{display:flex;flex-wrap:wrap;gap:5px;padding:12px 16px;}
.sw-tag{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:10px;color:var(--muted);}

/* Diff breakdown in SW */
.diff-breakdown{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;}
.diff-pip{font-size:9px;font-family:'Space Mono',monospace;padding:2px 5px;border-radius:4px;font-weight:700;}

/* ── Daily Tracker ── */
.dt-hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
.dt-hero-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;}
.dh-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px;}
.dh-val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;line-height:1;}
.dh-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.dt-quota-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:18px;}
.dt-quota-bar h3{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;}
.dq-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;}
.dq-item{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.dq-name{font-size:11px;color:var(--text2);margin-bottom:5px;}
.dq-nums{display:flex;align-items:baseline;gap:4px;}
.dq-done{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;}
.dq-quota{font-size:11px;color:var(--muted);}
.dq-bar{height:4px;border-radius:2px;background:var(--border);margin-top:5px;overflow:hidden;}
.dq-fill{height:100%;border-radius:2px;transition:width .4s;}
.dq-status{font-size:9px;margin-top:3px;font-family:'Space Mono',monospace;}
.dt-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3);overflow-x:auto;margin-bottom:16px;}
.dt-table{width:100%;border-collapse:collapse;min-width:820px;}
.dt-table thead th{padding:10px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;}
.dt-table th.dtc-date{text-align:left;padding-left:14px;color:var(--muted);min-width:100px;}
.dt-table th.dtc-v{color:#a78bfa;background:rgba(167,139,250,.08);}
.dt-table th.dtc-q{color:var(--d3);background:var(--d3b);}
.dt-table th.dtc-di{color:var(--accent);background:rgba(59,130,246,.08);}
.dt-table th.dtc-tot{color:var(--text2);background:rgba(255,255,255,.03);}
.dt-table tbody tr{transition:background .12s;}
.dt-table tbody tr:hover{background:rgba(255,255,255,.02);}
.dt-table tbody tr:not(:last-child) td{border-bottom:1px solid rgba(255,255,255,.03);}
.dt-table td{padding:0;text-align:center;vertical-align:middle;}
.dtc-date{text-align:left !important;padding:0 8px 0 14px !important;}
.dt-date-inner{display:flex;flex-direction:column;gap:1px;padding:7px 0;}
.dt-day{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--text);}
.dt-wd{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.today-badge{display:inline-block;font-size:8px;background:var(--accent);color:#fff;border-radius:3px;padding:1px 5px;font-weight:700;margin-top:2px;}
tr.is-today{background:rgba(59,130,246,.05) !important;}
tr.is-today td{border-top:1px solid rgba(59,130,246,.18) !important;border-bottom:1px solid rgba(59,130,246,.18) !important;}
tr.is-past .dt-day{color:var(--text2);}
.dt-ic{padding:3px 2px;min-width:64px;}
.dt-iw{display:flex;flex-direction:column;align-items:center;gap:1px;}
.dt-i{width:50px;height:24px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:5px;outline:none;color:var(--text2);font-family:'Space Mono',monospace;font-size:11px;text-align:center;cursor:pointer;-moz-appearance:textfield;transition:border-color .15s,color .15s;}
.dt-i::-webkit-inner-spin-button,.dt-i::-webkit-outer-spin-button{-webkit-appearance:none;}
.dt-i:focus{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.07);}
.dt-i.met{color:var(--success);border-color:rgba(16,185,129,.3);font-weight:700;}
.dt-i.over{color:#34d399;border-color:rgba(16,185,129,.45);font-weight:700;}
.dt-i.partial{color:var(--warn);border-color:rgba(245,158,11,.3);}
.dt-i.miss{color:var(--danger);border-color:rgba(239,68,68,.2);}
.dt-ql{font-size:8px;color:var(--muted);font-family:'Space Mono',monospace;}
.dt-tot-cell{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--text2);padding:0 6px;}
.dt-st-cell{padding:0 6px;min-width:78px;}
.dt-badge{font-size:9px;font-family:'Space Mono',monospace;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;}
.dt-badge.complete{background:rgba(16,185,129,.15);color:var(--success);}
.dt-badge.partial{background:rgba(245,158,11,.12);color:var(--warn);}
.dt-badge.missed{background:rgba(239,68,68,.12);color:var(--danger);}
.dt-badge.future{background:rgba(75,98,128,.1);color:var(--muted);}
.dt-badge.today{background:rgba(59,130,246,.15);color:var(--accent);}
.dt-def-cell{padding:0 6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;}
.dt-table tfoot td{padding:10px 6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--accent2);background:rgba(99,102,241,.07);border-top:1px solid var(--border);text-align:center;}
.dt-table tfoot td.dtc-date{text-align:left;padding-left:14px;font-size:10px;text-transform:uppercase;color:var(--muted);}
.tab.dt-tab.active{background:linear-gradient(135deg,#7c3aed,#5b21b6);box-shadow:0 4px 14px rgba(124,58,237,.25);}
.dt-deficit-note{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--text2);line-height:1.7;}
.dt-deficit-note strong{color:var(--danger);}
</style>
</head>
<body>
<div class="wrapper">

<header>
  <div class="logo">
    <h1>GMAT QUESTION TRACKER</h1>
    <p>Per-difficulty attempts, accuracy &amp; progress across all sections</p>
  </div>
  <div class="kpi-row">
    <div class="kpi"><div class="v" id="k-att" style="color:var(--accent)">0</div><div class="l">Attempted</div></div>
    <div class="kpi"><div class="v" id="k-cor" style="color:var(--success)">0</div><div class="l">Correct</div></div>
    <div class="kpi"><div class="v" id="k-acc" style="color:var(--warn)">—</div><div class="l">Accuracy</div></div>
    <div class="kpi"><div class="v" id="k-top" style="color:var(--accent2)">0</div><div class="l">Topics</div></div>
  </div>
</header>

<div class="ob">
  <span class="ob-lbl">Overall Coverage</span>
  <div class="ob-bar"><div class="ob-fill" id="ob-fill" style="width:0%"></div></div>
  <span class="ob-pct" id="ob-pct">0%</span>
</div>

<div class="savebar">
  <span class="savebar-lbl">💾 Data</span>
  <div class="savebar-btns">
    <button class="btn btn-exp" onclick="exportData()">⬇ Export Backup</button>
    <button class="btn btn-imp" onclick="document.getElementById('importFile').click()">⬆ Import Backup</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"/>
    <button class="btn btn-clr" onclick="clearData()">✕ Clear All</button>
  </div>
  <span class="save-status" id="save-status"></span>
</div>

<div class="legend">
  <span class="leg"><span class="leg-dot" style="background:var(--d1)"></span>Sub-505</span>
  <span class="leg"><span class="leg-dot" style="background:var(--d2)"></span>505–555</span>
  <span class="leg"><span class="leg-dot" style="background:var(--d3)"></span>555–605</span>
  <span class="leg"><span class="leg-dot" style="background:var(--d4)"></span>605–655</span>
  <span class="leg"><span class="leg-dot" style="background:var(--d5)"></span>655–705</span>
  <span class="leg"><span class="leg-dot" style="background:var(--d6)"></span>705–805</span>
  <span class="leg"><span class="leg-dot" style="background:var(--d7)"></span>805+</span>
  <span class="leg" style="margin-left:8px;color:var(--muted)">Each cell → <span style="color:var(--text2)">Att</span> = attempted &nbsp;|&nbsp; <span style="color:var(--success)">Cor</span> = correct</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('CR',this)">CR · Critical Reasoning</button>
  <button class="tab"        onclick="switchTab('RC',this)">RC · Reading Comprehension</button>
  <button class="tab"        onclick="switchTab('QT',this)">Quants</button>
  <button class="tab"        onclick="switchTab('DI',this)">DI · Data Insights</button>
  <button class="tab sw-tab" onclick="switchTab('SW',this)">⚡ Strengths &amp; Weaknesses</button>
  <button class="tab dt-tab" onclick="switchTab('DT',this)">📅 Daily Tracker</button>
</div>

<div id="panels"></div>
<div id="panel-SW" class="panel"></div>
<div id="panel-DT" class="panel"></div>

</div>
<script>
const DIFF=[
  {label:'Sub-505',cls:'g1',color:'var(--d1)'},
  {label:'505–555',cls:'g2',color:'var(--d2)'},
  {label:'555–605',cls:'g3',color:'var(--d3)'},
  {label:'605–655',cls:'g4',color:'var(--d4)'},
  {label:'655–705',cls:'g5',color:'var(--d5)'},
  {label:'705–805',cls:'g6',color:'var(--d6)'},
  {label:'805+',   cls:'g7',color:'var(--d7)'},
];

const SECTIONS={
  CR:{full:'Critical Reasoning',   topics:['Assumptions','Bold Face CR','Complete the Passage','Conclusion','Evaluate an Argument','Inference','Logical Flaw','Method of Reasoning','Must Be True','Resolve a Paradox','Similar Reasoning','Strengthen Argument','Weaken Argument']},
  RC:{full:'Reading Comprehension', topics:['Humanities','Science','Business','Social Science','Long Passage','Short Passage']},
  QT:{full:'Quants',                topics:['Absolute Values/Modules','Algebra','Arithmetic','Combinations','Distance/Rate Problems','Divisibility/Multiples/Factors','Exponents/Powers','Fractions/Ratios/Decimals','Functions and Custom Characters','Graphs and Illustrations','Inequalities','Min/Max Problems','Mixture Problems','Must or Could be True Questions','Number Properties','Percents and Interest Problems','Roots','Sequences','Statistics and Sets Problems','Word Problems','Work/Rate Problems']},
  DI:{full:'Data Insights', topics:[
    'DS · Combinations','DS · Distance/Rate Problems',
    'DS · Functions and Custom Characters','DS · Min/Max Problems','DS · Mixture Problems',
    'DS · Overlapping Sets','DS · Percents and Interest Problems','DS · Probability',
    'DS · Sequences','DS · Statistics and Sets Problems','DS · Word Problems','DS · Work/Rate Problems',
    'TPA · Math Related','TPA · Non-Math Related',
    'MSR · Math Related','MSR · Non-Math Related',
  ]},
};
const TARGET=70;

// ── Storage ───────────────────────────────────────────────────────────────────
let DB={};
function dbLoad(){try{const r=localStorage.getItem('gmat_v4');if(r)DB=JSON.parse(r);}catch{DB={};}}
function dbSave(){
  try{localStorage.setItem('gmat_v4',JSON.stringify(DB));showStatus('✓ Saved','var(--success)');}
  catch{showStatus('⚠ Use Export!','var(--warn)');}
}
function showStatus(msg,clr){
  const el=document.getElementById('save-status');
  el.textContent=msg;el.style.color=clr;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2500);
}

// Keys: attempted = s_t_di_a, correct = s_t_di_c
function ska(s,t,d){return `${s}_${t}_${d}_a`;}
function skc(s,t,d){return `${s}_${t}_${d}_c`;}
function lv(k){return parseInt(DB[k])||0;}
function sv(k,v){DB[k]=v;dbSave();}

// ── Export / Import / Clear ───────────────────────────────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`gmat_tracker_${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(url);showStatus('✓ Backup downloaded!','var(--success)');
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      DB=JSON.parse(ev.target.result);dbSave();
      reloadAllInputs();
      for(const sec of Object.keys(SECTIONS))updateSection(sec);
      updateGlobal();showStatus('✓ Imported!','var(--success)');
    }catch{showStatus('✗ Invalid file','var(--danger)');}
  };
  r.readAsText(f);e.target.value='';
}
function clearData(){
  if(!confirm('Clear ALL progress? Cannot be undone.'))return;
  DB={};try{localStorage.removeItem('gmat_v4');}catch{}
  document.querySelectorAll('.dc-inp').forEach(i=>{i.value=0;i.classList.remove('hv');});
  for(const sec of Object.keys(SECTIONS))updateSection(sec);
  updateGlobal();showStatus('✓ Cleared','var(--muted)');
}
function reloadAllInputs(){
  for(const [sec,data] of Object.entries(SECTIONS)){
    data.topics.forEach((_,ti)=>{
      DIFF.forEach((_d,di)=>{
        const ai=document.querySelector(`.att-inp[data-s="${sec}"][data-t="${ti}"][data-d="${di}"]`);
        const ci=document.querySelector(`.cor-inp[data-s="${sec}"][data-t="${ti}"][data-d="${di}"]`);
        if(ai){const v=lv(ska(sec,ti,di));ai.value=v;ai.classList.toggle('hv',v>0);}
        if(ci){const v=lv(skc(sec,ti,di));ci.value=v;ci.classList.toggle('hv',v>0);}
      });
    });
  }
}

// ── Build panels ──────────────────────────────────────────────────────────────
function buildPanels(){
  const container=document.getElementById('panels');
  for(const [sec,data] of Object.entries(SECTIONS)){
    const p=document.createElement('div');
    p.className='panel'+(sec==='CR'?' active':'');
    p.id=`panel-${sec}`;

    // Build header rows
    const hr1cols = DIFF.map((d,di)=>`<th class="${d.cls}" colspan="1" style="min-width:74px">${d.label}</th>`).join('');
    const hr2cols = DIFF.map((d,di)=>`<th class="${d.cls}"><span style="opacity:.5">Att&nbsp;/&nbsp;Cor</span></th>`).join('');

    p.innerHTML=`
      <div class="sec-title">${sec} — ${data.full}</div>
      <div class="tbl-wrap"><table>
        <thead>
          <tr class="hr1">
            <th class="tc" rowspan="2">Topic</th>
            ${hr1cols}
            <th class="g-tot" rowspan="2">Total<br><span style="font-size:9px;opacity:.6">Att / Cor</span></th>
            <th class="g-acc" rowspan="2">Overall<br>Accuracy</th>
            <th class="g-prg" rowspan="2">Progress</th>
          </tr>
          <tr class="hr2">
            ${hr2cols}
          </tr>
        </thead>
        <tbody>${data.topics.map((t,ti)=>buildRow(sec,t,ti)).join('')}</tbody>
        <tfoot><tr>
          <td class="tn">Column Total</td>
          ${DIFF.map((_,di)=>`<td id="ct-${sec}-${di}"><div class="ft-mini"><span class="ft-att" id="cta-${sec}-${di}">0</span><span class="ft-cor" id="ctc-${sec}-${di}">0✓</span><span class="ft-acc" id="ctacc-${sec}-${di}">—</span></div></td>`).join('')}
          <td id="gt-${sec}"><div class="ft-mini"><span class="ft-att" id="gta-${sec}">0</span><span class="ft-cor" id="gtc-${sec}">0✓</span></div></td>
          <td id="gacc-${sec}" class="ft-acc" style="color:var(--warn)">—</td>
          <td></td>
        </tr></tfoot>
      </table></div>`;
    container.appendChild(p);
  }
}

function buildRow(sec,topic,ti){
  const diffCells=DIFF.map((_,di)=>{
    const a=lv(ska(sec,ti,di)), c=lv(skc(sec,ti,di));
    const acc=a>0?Math.round((c/a)*100):null;
    const accHtml=acc!==null?`<span style="color:${accClr(acc)}">${acc}%</span>`:'<span style="color:var(--muted)">—</span>';
    return `<td>
      <div class="dc-cell">
        <div class="dc-row">
          <span class="dc-lbl att">A</span>
          <input class="dc-inp att-inp ${a>0?'hv':''}" type="number" min="0" max="999" value="${a}"
            data-s="${sec}" data-t="${ti}" data-d="${di}" onchange="onA(this)" oninput="onA(this)"/>
        </div>
        <div class="dc-row">
          <span class="dc-lbl cor">C</span>
          <input class="dc-inp cor-inp ${c>0?'hv':''}" type="number" min="0" max="999" value="${c}"
            data-s="${sec}" data-t="${ti}" data-d="${di}" onchange="onC(this)" oninput="onC(this)"/>
        </div>
        <div class="dc-acc" id="dacc-${sec}-${ti}-${di}">${accHtml}</div>
      </div>
    </td>`;
  }).join('');

  // Row totals
  let totA=0,totC=0;
  DIFF.forEach((_,di)=>{totA+=lv(ska(sec,ti,di));totC+=lv(skc(sec,ti,di));});
  const rowAcc=totA>0?Math.round((totC/totA)*100):null;
  const pct=Math.min(100,Math.round((totA/TARGET)*100));

  return `<tr>
    <td class="tn">${topic}</td>
    ${diffCells}
    <td class="tot-cell" id="rt-${sec}-${ti}"><div class="ft-mini">
      <span id="rta-${sec}-${ti}">${totA}</span>
      <span style="color:var(--success);font-size:10px" id="rtc-${sec}-${ti}">${totC}✓</span>
    </div></td>
    <td class="acc-cell" id="racc-${sec}-${ti}" style="color:${rowAcc!==null?accClr(rowAcc):'var(--muted)'}">
      ${rowAcc!==null?rowAcc+'%':'—'}
    </td>
    <td class="prg-cell">
      <div class="pb"><div class="pf" id="pb-${sec}-${ti}" style="width:${pct}%"></div></div>
      <div class="pp" id="pp-${sec}-${ti}">${pct}%</div>
    </td>
  </tr>`;
}

// ── Input handlers ────────────────────────────────────────────────────────────
function onA(el){
  const{s,t,d}=el.dataset;const v=Math.max(0,parseInt(el.value)||0);el.value=v;
  el.classList.toggle('hv',v>0);sv(ska(s,+t,+d),v);go(s,+t,+d);
}
function onC(el){
  const{s,t,d}=el.dataset;
  // Cap correct at attempted
  const att=lv(ska(s,+t,+d));
  const v=Math.max(0,Math.min(att||9999,parseInt(el.value)||0));
  el.value=v;el.classList.toggle('hv',v>0);sv(skc(s,+t,+d),v);go(s,+t,+d);
}

function accClr(p){return p>=80?'var(--success)':p>=60?'var(--warn)':'var(--danger)';}

function go(sec,ti,di){
  // Update just the diff accuracy badge
  const a=lv(ska(sec,ti,di)),c=lv(skc(sec,ti,di));
  const el=document.getElementById(`dacc-${sec}-${ti}-${di}`);
  if(el){
    const acc=a>0?Math.round((c/a)*100):null;
    el.innerHTML=acc!==null?`<span style="color:${accClr(acc)}">${acc}%</span>`:'<span style="color:var(--muted)">—</span>';
  }
  updateSection(sec);updateGlobal();
  if(document.getElementById('panel-SW').classList.contains('active'))renderSW();
}

// ── Section update ────────────────────────────────────────────────────────────
function updateSection(sec){
  const topics=SECTIONS[sec].topics;
  const ctA=new Array(7).fill(0), ctC=new Array(7).fill(0);
  let secA=0,secC=0;

  topics.forEach((_,ti)=>{
    let rA=0,rC=0;
    DIFF.forEach((_d,di)=>{
      const a=lv(ska(sec,ti,di)),c=lv(skc(sec,ti,di));
      rA+=a;rC+=c;ctA[di]+=a;ctC[di]+=c;
    });
    secA+=rA;secC+=rC;

    // Row total
    const rta=document.getElementById(`rta-${sec}-${ti}`);if(rta)rta.textContent=rA;
    const rtc=document.getElementById(`rtc-${sec}-${ti}`);if(rtc)rtc.textContent=rC+'✓';

    // Row accuracy
    const racc=document.getElementById(`racc-${sec}-${ti}`);
    if(racc){
      const acc=rA>0?Math.round((rC/rA)*100):null;
      racc.textContent=acc!==null?acc+'%':'—';
      racc.style.color=acc!==null?accClr(acc):'var(--muted)';
    }

    // Progress
    const pct=Math.min(100,Math.round((rA/TARGET)*100));
    const pb=document.getElementById(`pb-${sec}-${ti}`);if(pb)pb.style.width=pct+'%';
    const pp=document.getElementById(`pp-${sec}-${ti}`);if(pp)pp.textContent=pct+'%';
  });

  // Column footers
  DIFF.forEach((_,di)=>{
    const ea=document.getElementById(`cta-${sec}-${di}`);if(ea)ea.textContent=ctA[di];
    const ec=document.getElementById(`ctc-${sec}-${di}`);if(ec)ec.textContent=ctC[di]+'✓';
    const eacc=document.getElementById(`ctacc-${sec}-${di}`);
    if(eacc){
      const acc=ctA[di]>0?Math.round((ctC[di]/ctA[di])*100):null;
      eacc.textContent=acc!==null?acc+'%':'—';
      eacc.style.color=acc!==null?accClr(acc):'var(--muted)';
    }
  });

  const gta=document.getElementById(`gta-${sec}`);if(gta)gta.textContent=secA;
  const gtc=document.getElementById(`gtc-${sec}`);if(gtc)gtc.textContent=secC+'✓';
  const gacc=document.getElementById(`gacc-${sec}`);
  if(gacc){
    const acc=secA>0?Math.round((secC/secA)*100):null;
    gacc.textContent=acc!==null?acc+'%':'—';
    gacc.style.color=acc!==null?accClr(acc):'var(--warn)';
  }
}

// ── Global KPIs ───────────────────────────────────────────────────────────────
function updateGlobal(){
  let totA=0,totC=0,started=0;
  const allT=Object.values(SECTIONS).reduce((s,d)=>s+d.topics.length,0);
  for(const [sec,data] of Object.entries(SECTIONS)){
    data.topics.forEach((_,ti)=>{
      let rA=0,rC=0;
      DIFF.forEach((_d,di)=>{rA+=lv(ska(sec,ti,di));rC+=lv(skc(sec,ti,di));});
      totA+=rA;totC+=rC;if(rA>0)started++;
    });
  }
  const covPct=Math.min(100,Math.round((totA/(allT*TARGET))*100));
  const acc=totA>0?Math.round((totC/totA)*100):null;
  document.getElementById('k-att').textContent=totA;
  document.getElementById('k-cor').textContent=totC;
  document.getElementById('k-acc').textContent=acc!==null?acc+'%':'—';
  document.getElementById('k-top').textContent=started;
  document.getElementById('ob-fill').style.width=covPct+'%';
  document.getElementById('ob-pct').textContent=covPct+'%';
}

// ── Strengths & Weaknesses ────────────────────────────────────────────────────
function renderSW(){
  const sw=document.getElementById('panel-SW');
  const all=[];
  for(const [sec,data] of Object.entries(SECTIONS)){
    data.topics.forEach((topic,ti)=>{
      let totA=0,totC=0;
      const diffStats=DIFF.map((_,di)=>{
        const a=lv(ska(sec,ti,di)),c=lv(skc(sec,ti,di));
        totA+=a;totC+=c;
        return{a,c,acc:a>0?Math.round((c/a)*100):null,label:_.label,cls:_.cls,color:_.color};
      });
      const acc=totA>0?Math.round((totC/totA)*100):null;
      all.push({sec,secFull:data.full,topic,totA,totC,acc,diffStats});
    });
  }

  const withAcc=all.filter(x=>x.acc!==null).sort((a,b)=>b.acc-a.acc);
  const strengths=withAcc.filter(x=>x.acc>=70);
  const medium=withAcc.filter(x=>x.acc>=60&&x.acc<70);
  const weak=withAcc.filter(x=>x.acc<60).reverse();
  const none=all.filter(x=>x.totA===0);

  const secStats={};
  for(const [sec,data] of Object.entries(SECTIONS)){
    let a=0,c=0;
    data.topics.forEach((_,ti)=>DIFF.forEach((__,di)=>{a+=lv(ska(sec,ti,di));c+=lv(skc(sec,ti,di));}));
    secStats[sec]={a,c,full:data.full};
  }

  function diffPips(x){
    return x.diffStats
      .filter(d=>d.a>0)
      .map(d=>`<span class="diff-pip" style="background:${d.color}22;color:${d.color}">${d.label.split('–')[0]}: ${d.acc}%</span>`)
      .join('');
  }

  function itemHtml(x,cls){
    const pips=diffPips(x);
    return `<div class="sw-item">
      <div class="si-l">
        <span class="si-name">${x.topic}</span>
        <span class="si-sec">${x.sec} · ${x.secFull}</span>
        ${pips?`<div class="diff-breakdown">${pips}</div>`:''}
      </div>
      <div class="si-r">
        <span class="si-cnt">${x.totC}/${x.totA}</span>
        <span class="si-badge ${cls}">${x.acc}%</span>
      </div>
    </div>`;
  }

  sw.innerHTML=`
    <div class="sec-title">Strengths &amp; Weaknesses Analysis</div>
    <div class="sw-note">
      <strong>How it works:</strong> Each cell tracks <strong>Attempted (A)</strong> and <strong>Correct (C)</strong> separately per difficulty level. Accuracy is shown both per-difficulty (inside each cell) and aggregated here.
      &nbsp;|&nbsp; <strong style="color:var(--success)">≥70%</strong> Strength &nbsp;
      <strong style="color:var(--warn)">60–69%</strong> Needs Work &nbsp;
      <strong style="color:var(--danger)">&lt;60%</strong> Weakness
    </div>

    <div class="sw-summary">
      <h3>Section Accuracy Overview</h3>
      <div class="sw-bars">
        ${Object.entries(secStats).map(([sec,s])=>{
          const pct=s.a>0?Math.round((s.c/s.a)*100):null;
          const clr=pct===null?'var(--muted)':pct>=70?'var(--success)':pct>=60?'var(--warn)':'var(--danger)';
          return `<div class="sw-br">
            <span class="sw-bl">${sec} · ${s.full}</span>
            <div class="sw-bt"><div class="sw-bf" style="width:${pct||0}%;background:${clr}"></div></div>
            <span class="sw-bp" style="color:${clr}">${pct!==null?pct+'%':'—'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="sw-grid">
      <div class="sw-card">
        <div class="sw-hd str"><span class="hd-dot" style="background:var(--success)"></span>Strengths ≥70%
          <span style="margin-left:auto;font-size:10px;opacity:.7">${strengths.length} topics</span></div>
        <div class="sw-list">${strengths.length===0
          ?'<div class="sw-empty">No strengths yet.<br>Enter Att &amp; Cor counts in the section tabs.</div>'
          :strengths.map(x=>itemHtml(x,'str')).join('')}</div>
      </div>
      <div class="sw-card">
        <div class="sw-hd wk"><span class="hd-dot" style="background:var(--danger)"></span>Weaknesses &lt;60%
          <span style="margin-left:auto;font-size:10px;opacity:.7">${weak.length} topics</span></div>
        <div class="sw-list">${weak.length===0
          ?'<div class="sw-empty">No weaknesses yet.<br>Enter Att &amp; Cor counts in the section tabs.</div>'
          :weak.map(x=>itemHtml(x,'wk')).join('')}</div>
      </div>
    </div>

    ${medium.length?`
    <div class="sw-card" style="margin-bottom:14px">
      <div class="sw-hd med"><span class="hd-dot" style="background:var(--warn)"></span>Needs Work 60–69%
        <span style="margin-left:auto;font-size:10px;opacity:.7">${medium.length} topics</span></div>
      <div class="sw-list">${medium.map(x=>itemHtml(x,'med')).join('')}</div>
    </div>`:''}

    ${none.length?`
    <div class="sw-card">
      <div class="sw-hd none"><span class="hd-dot" style="background:var(--muted)"></span>Not Yet Attempted
        <span style="margin-left:auto;font-size:10px;opacity:.7">${none.length} topics</span></div>
      <div class="sw-tags">${none.map(x=>`<span class="sw-tag">${x.sec} · ${x.topic}</span>`).join('')}</div>
    </div>`:''}
  `;
}

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(sec,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${sec}`).classList.add('active');
  if(sec==='SW')renderSW();
  if(sec==='DT')renderDT();
}

// ── Daily Tracker ─────────────────────────────────────────────────────────────
const QUOTAS={RC:5,CR:25,QT:25,MSR:10,TPA:10,DS:8};
const QUOTA_TOTAL=Object.values(QUOTAS).reduce((a,b)=>a+b,0); // 83
const DT_START=new Date('2026-03-15');
const DT_END  =new Date('2026-04-15');

function dtDates(){
  const dates=[];
  for(let d=new Date(DT_START);d<=DT_END;d.setDate(d.getDate()+1))
    dates.push(new Date(d));
  return dates;
}
function dtKey(date,cat){
  return `dt_${date.toISOString().slice(0,10)}_${cat}`;
}
function dtGet(date,cat){return lv(dtKey(date,cat));}
function dtSet(date,cat,v){sv(dtKey(date,cat),v);}

function todayStr(){return new Date().toISOString().slice(0,10);}
function isToday(d){return d.toISOString().slice(0,10)===todayStr();}
function isPast(d){return d<new Date(new Date().setHours(0,0,0,0));}

const WEEKDAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function dtInputClass(done,quota){
  if(done===0)return '';
  if(done>=quota*1.1)return 'over';
  if(done>=quota)return 'met';
  if(done>0)return 'partial';
  return 'miss';
}

function renderDT(){
  const panel=document.getElementById('panel-DT');
  const dates=dtDates();
  const today=new Date(new Date().setHours(0,0,0,0));

  // Compute summary stats
  let totalDeficit=0, daysComplete=0, daysMissed=0, totalDone=0;
  const catDeficit={RC:0,CR:0,QT:0,MSR:0,TPA:0,DS:0};
  const todayDate=dates.find(d=>isToday(d));

  dates.forEach(d=>{
    if(!isPast(d)&&!isToday(d))return;
    let dayComplete=true;
    Object.keys(QUOTAS).forEach(cat=>{
      const done=dtGet(d,cat);
      const def=Math.max(0,QUOTAS[cat]-done);
      catDeficit[cat]+=def;
      totalDeficit+=def;
      totalDone+=done;
      if(done<QUOTAS[cat])dayComplete=false;
    });
    if(dayComplete)daysComplete++;
    else if(isPast(d))daysMissed++;
  });

  // Today's totals
  const todayDone={};let todayTotal=0;
  Object.keys(QUOTAS).forEach(cat=>{
    todayDone[cat]=todayDate?dtGet(todayDate,cat):0;
    todayTotal+=todayDone[cat];
  });

  const daysElapsed=dates.filter(d=>isPast(d)||isToday(d)).length;
  const daysLeft=dates.filter(d=>!isPast(d)&&!isToday(d)).length+1;

  // Hero cards
  const heroHTML=`
    <div class="dt-hero">
      <div class="dt-hero-card">
        <div class="dh-label">Today's Progress</div>
        <div class="dh-val" style="color:${todayTotal>=QUOTA_TOTAL?'var(--success)':'var(--warn)'}">${todayTotal}<span style="font-size:12px;color:var(--muted)">/${QUOTA_TOTAL}</span></div>
        <div class="dh-sub">${todayTotal>=QUOTA_TOTAL?'✓ Quota met!':QUOTA_TOTAL-todayTotal+' left today'}</div>
      </div>
      <div class="dt-hero-card">
        <div class="dh-label">Days Complete</div>
        <div class="dh-val" style="color:var(--success)">${daysComplete}</div>
        <div class="dh-sub">of ${daysElapsed} elapsed</div>
      </div>
      <div class="dt-hero-card">
        <div class="dh-label">Cumul. Deficit</div>
        <div class="dh-val" style="color:${totalDeficit===0?'var(--success)':'var(--danger)'}">${totalDeficit}</div>
        <div class="dh-sub">questions missed</div>
      </div>
      <div class="dt-hero-card">
        <div class="dh-label">Days Remaining</div>
        <div class="dh-val" style="color:var(--accent2)">${daysLeft}</div>
        <div class="dh-sub">until Apr 15</div>
      </div>
      <div class="dt-hero-card">
        <div class="dh-label">Total Done</div>
        <div class="dh-val" style="color:var(--accent)">${totalDone}</div>
        <div class="dh-sub">across all days</div>
      </div>
    </div>`;

  // Today's quota progress bars
  const quotaHTML=`
    <div class="dt-quota-bar">
      <h3>Today's Quota Status</h3>
      <div class="dq-grid">
        ${Object.entries(QUOTAS).map(([cat,q])=>{
          const done=todayDone[cat]||0;
          const pct=Math.min(100,Math.round((done/q)*100));
          const clr=done>=q?'var(--success)':done>0?'var(--warn)':'var(--muted)';
          const label={RC:'RC · Reading',CR:'CR · Critical',QT:'Quants',MSR:'DI · MSR',TPA:'DI · TPA',DS:'DI · DS'}[cat];
          return `<div class="dq-item">
            <div class="dq-name">${label}</div>
            <div class="dq-nums">
              <span class="dq-done" style="color:${clr}">${done}</span>
              <span class="dq-quota">/ ${q}</span>
            </div>
            <div class="dq-bar"><div class="dq-fill" style="width:${pct}%;background:${clr}"></div></div>
            <div class="dq-status" style="color:${clr}">${done>=q?'✓ Done':done>0?'+'+( q-done)+' to go':'Not started'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  // Deficit note
  const defHTML = totalDeficit>0 ? `
    <div class="dt-deficit-note">
      <strong>⚠ Cumulative Deficit: ${totalDeficit} questions</strong> — You can cover these on any future day by doing extra questions.
      Breakdown: ${Object.entries(catDeficit).filter(([,v])=>v>0).map(([k,v])=>`<strong>${k}: ${v}</strong>`).join(' · ')}
    </div>` : '';

  // Main table
  const cats=Object.keys(QUOTAS);
  const tableHTML=`
    <div class="dt-wrap">
      <table class="dt-table">
        <thead>
          <tr>
            <th class="dtc-date" rowspan="2">Date</th>
            <th class="dtc-v" colspan="2">Verbal</th>
            <th class="dtc-q" colspan="1">Quants</th>
            <th class="dtc-di" colspan="3">DI</th>
            <th class="dtc-tot" rowspan="2">Total</th>
            <th rowspan="2" style="color:var(--muted)">Status</th>
            <th rowspan="2" style="color:var(--muted)">Deficit</th>
          </tr>
          <tr>
            <th class="dtc-v">RC<br><span style="opacity:.5;font-size:8px">q:${QUOTAS.RC}</span></th>
            <th class="dtc-v">CR<br><span style="opacity:.5;font-size:8px">q:${QUOTAS.CR}</span></th>
            <th class="dtc-q">QT<br><span style="opacity:.5;font-size:8px">q:${QUOTAS.QT}</span></th>
            <th class="dtc-di">MSR<br><span style="opacity:.5;font-size:8px">q:${QUOTAS.MSR}</span></th>
            <th class="dtc-di">TPA<br><span style="opacity:.5;font-size:8px">q:${QUOTAS.TPA}</span></th>
            <th class="dtc-di">DS<br><span style="opacity:.5;font-size:8px">q:${QUOTAS.DS}</span></th>
          </tr>
        </thead>
        <tbody>
          ${dates.map(date=>{
            const dStr=date.toISOString().slice(0,10);
            const isTod=isToday(date);
            const isPas=isPast(date)&&!isTod;
            const isFut=!isPast(date)&&!isTod;
            const rowClass=isTod?'is-today':isPas?'is-past':'is-future';

            let dayTotal=0,dayDeficit=0;
            const inputs=cats.map(cat=>{
              const done=dtGet(date,cat);
              dayTotal+=done;
              const def=Math.max(0,QUOTAS[cat]-done);
              if(!isFut)dayDeficit+=def;
              const cls=isFut?'':(done===0&&!isTod?'miss':dtInputClass(done,QUOTAS[cat]));
              return `<td class="dt-ic">
                <div class="dt-iw">
                  <input class="dt-i ${cls}" type="number" min="0" max="999" value="${done}"
                    data-date="${dStr}" data-cat="${cat}"
                    onchange="dtChange(this)" oninput="dtChange(this)"/>
                </div>
              </td>`;
            }).join('');

            const totClr=dayTotal>=QUOTA_TOTAL?'var(--success)':dayTotal>0?'var(--warn)':'var(--muted)';
            let badge='';
            if(isTod)badge='<span class="dt-badge today">TODAY</span>';
            else if(isFut)badge='<span class="dt-badge future">—</span>';
            else if(dayTotal>=QUOTA_TOTAL)badge='<span class="dt-badge complete">✓ Done</span>';
            else if(dayTotal>0)badge='<span class="dt-badge partial">Partial</span>';
            else badge='<span class="dt-badge missed">Missed</span>';

            const defClr=dayDeficit===0?'var(--success)':dayDeficit>0?'var(--danger)':'var(--muted)';

            return `<tr class="${rowClass}">
              <td class="dtc-date">
                <div class="dt-date-inner">
                  <span class="dt-day">${date.getDate()} ${MONTHS[date.getMonth()]}</span>
                  <span class="dt-wd">${WEEKDAYS[date.getDay()]}</span>
                  ${isTod?'<span class="today-badge">TODAY</span>':''}
                </div>
              </td>
              ${inputs}
              <td class="dt-tot-cell" style="color:${totClr}">${dayTotal||'—'}</td>
              <td class="dt-st-cell">${badge}</td>
              <td class="dt-def-cell" style="color:${isFut?'var(--muted)':defClr}">${isFut?'—':dayDeficit===0?'✓':'-'+dayDeficit}</td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td class="dtc-date">Total</td>
            ${cats.map(cat=>{
              const tot=dates.reduce((s,d)=>s+dtGet(d,cat),0);
              const quota=QUOTAS[cat]*dates.length;
              return `<td style="color:${tot>=quota?'var(--success)':'var(--accent2)'}">${tot}</td>`;
            }).join('')}
            <td>${dates.reduce((s,d)=>s+cats.reduce((cs,cat)=>cs+dtGet(d,cat),0),0)}</td>
            <td></td>
            <td style="color:${totalDeficit===0?'var(--success)':'var(--danger)'}">-${totalDeficit}</td>
          </tr>
        </tfoot>
      </table>
    </div>`;

  panel.innerHTML=`<div class="sec-title">📅 Daily Question Tracker — Mar 15 → Apr 15</div>${heroHTML}${quotaHTML}${defHTML}${tableHTML}`;
}

function dtChange(el){
  const{date,cat}=el.dataset;
  const v=Math.max(0,parseInt(el.value)||0);
  el.value=v;
  const d=new Date(date);
  dtSet(d,cat,v);
  // Update input colour class
  const cls=dtInputClass(v,QUOTAS[cat]);
  el.className=`dt-i ${cls}`;
  // Re-render hero + quota bars only (avoid full rebuild while typing)
  renderDT();
}

// ── Init ──────────────────────────────────────────────────────────────────────
dbLoad();
buildPanels();
for(const sec of Object.keys(SECTIONS))updateSection(sec);
updateGlobal();
</script>
</body>
</html>
